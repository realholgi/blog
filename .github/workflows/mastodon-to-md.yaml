name: Convert Mastodon Posts to Markdown

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          npm init -y
          npm pkg set type=module
          npm install mastodon-api fs path glob gray-matter

      - name: Run conversion script
        env:
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          MASTODON_URL: ${{ secrets.MASTODON_URL }}
          MASTODON_HASHTAG: ${{ secrets.MASTODON_HASHTAG }}
          MAX_POSTS: ${{ secrets.MAX_POSTS }}
        run: node scripts/convert-posts.js

      - name: Commit changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add content/posts/ static/images/posts/

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update markdown files from Mastodon posts"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Hugo Build
        if: steps.commit.outputs.changed == 'true'
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ github.token }}
          event-type: trigger-hugo
